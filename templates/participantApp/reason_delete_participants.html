{% extends 'index.html' %}
{% load static %}

{% block content %}
<section class="add_review">
    <div class="add_review_block">
        <div class="add_review_btn_title">
            <h2 class="add_review_btn_title">Удаление участника</h2>
        </div>
        <p>Пожалуйста, укажите причину удаления, чтобы пользователь был осведомлен:</p>
        <form method="post" class="add_review_form">
            {% csrf_token %}
            <div class="form-group">
                <textarea class="create_event_form_item create_event_form_description" name="reason" placeholder="Причина" rows="10" style="width: 100%;">{{ form.reason.value|default:'' }}</textarea>
                {% if form.reason.errors %}
                    <div class="text-danger">{{ form.reason.errors }}</div>
                {% endif %}
            </div>
            <div class="modal-footer">
                <button type="submit" class="add_review_form_item add_review_form_item_btn">Удалить участника</button>
                <a href="{% url 'participants_list' event_id=event.id %}" class="add_review_form_item add_review_form_item_btn">Отмена</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
