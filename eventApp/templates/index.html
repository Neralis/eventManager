
{%load static%}

<!DOCTYPE html>
<html lang="en">
<head>
   
    {% csrf_token %}
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eventManager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">

    <script src="https://api-maps.yandex.ru/v3/?apikey=97a85acd-ba8a-4b10-b1a1-8a55ae3b2fc7" type="text/javascript">
    </script>
    
</head>
<body>
    <header class="header">
        <div class="header_logo">
            <img src="{% static 'img/logo_img.png' %}" alt="logo" class="logo">
        </div>
        <div class="header_func">
            <form action="" method="get" class="header_func_search">
                <input type="text" class="search" placeholder="searh">
                <input type="button" class="header_btn_search">
            </form>
            <a href="#" class="header_func_add_event" class="btn btn-secondary" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Добавить мероприятие"></a>
            <div class="header_func_user">
                <a class="header_func_user_sign_in">войти</a>
                <a class="header_func_user_signout highlight_text">регистрация</a>
            </div>
            
            <div class="header_func_menu">
                <div class="header_func_burger">
                    <img src="{%static 'img/burger.png'%}" alt="burger" class="burger">
                </div>
                <ul class="header_func_menu_items">
                    <li class="header_func_menu_item"><a href="#">Профиль</a></li>
                    <li class="header_func_menu_item"><a href="#">Главная</a></li>
                    <li class="header_func_menu_item"><a href="#">Мои мероприятия</a></li>
                    <li class="header_func_menu_item"><a href="#">Запланированные мероприятия</a></li>
                    <li class="header_func_menu_item"><a href="#">Выйти</a></li>
                </ul>
            </div>
        </div>
    </header>
    <main>
        {% block content %}

        {% endblock %}
    </main>
    <footer class="footer">
        <div class="footer_content">
             <ul class="footer_link">
                <li class="footer_link_item"><a href="#">Главная</a></li>
                <li class="footer_link_item"><a href="#">О нас</a></li>
                <li class="footer_link_item"><a href="#">Реклама</a></li>
                <li class="footer_link_item"><a href="#">Помощь</a></li>
                <li class="footer_link_item"><a href="#">Задать вопрос</a></li>
            </ul>
            <ul class="footer_social">
                <li class="footer_social_item telegram"><a href="#"></a></li>
                <li class="footer_social_item vk"><a href="#"></a></li>
                <li class="footer_social_item gmail"><a href="#"></a></li>
            </ul>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
