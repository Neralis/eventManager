    {% extends 'index.html' %}
    {% load static %}
    {% block content %}

    <section class="registration">
        <div class="registr_event_block">
            <div class="registr_event_btn_title">
                <a href="" class="registr_event_btn">←</a>
                <h2>Запись на мероприятие</h2>
            </div>

            <form id="anon-register-form" method="post" data-event-id="{{ event_id }}" class="registr_event_form">

                {% csrf_token %}
                <input class="registr_event_form_item registration_form_item_phone" type="tel" name="phone" placeholder="+7(___)___-__-__" required>
                <input class="registr_event_form_item" type="email" name="email" placeholder="email" required>
                <input class="registr_event_form_item registr_event_form_item_btn" type="submit" value="Записаться">
            </form>
            
        </div>

        <script src="{% static 'js/registration_not_auth_user.js' %}"></script>
    </section>

    {% endblock %}
